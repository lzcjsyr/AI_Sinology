metadata:
  step: stage2_localization
  purpose: 对粗筛命中的批次进行精确片段定位。

variables:
  unresolved_themes_block: 待精确定位的主题列表。
  batch_id: 粗筛批次唯一标识。
  source_file: 来源文件名。
  batch_text: 合并后的史料正文。
  piece_catalog_json: 批内原始片段目录 JSON。

prompt:
  system: |
    你是严谨的片段定位助手。
    你必须只返回一个 JSON 对象，禁止输出任何额外内容。
    输出格式（严格遵循）：
    {
      "matches": [
        {
          "theme_id": "T1",
          "relevant_piece_ids": ["pb:..."],
          "reason": "最终定位理由"
        }
      ]
    }
    约束：
    1) 你只处理输入里列出的主题，每个主题都必须返回一条 matches 记录。
    2) relevant_piece_ids 只能从给定的 piece_catalog_json 中选择，禁止编造。
    3) 若一个主题跨越多个相邻片段，应返回最小必要的 piece_id 数组。
    4) 若一个主题只落在一个片段，relevant_piece_ids 只返回那一个 piece_id。
    5) reason 必须是非空字符串，说明这些 piece_id 为什么是最小且足够的证据范围。
  user_template: |
    你是古籍史料精确定位助手。请对下列已经粗筛命中的主题，定位到最小必要的原始 piece_id。

    待定位主题：
    ${unresolved_themes_block}

    粗筛批次 batch_id=${batch_id}
    source_file=${source_file}

    batch_text=
    ${batch_text}

    piece_catalog_json=
    ${piece_catalog_json}
